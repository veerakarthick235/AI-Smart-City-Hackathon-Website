<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Night sky background -->
  <rect width="100" height="100" rx="20" fill="#0A0A1A" />
  
  <!-- Glowing gradient definition -->
  <defs>
    <linearGradient id="cityGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="cityGlow2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06FFA5" />
      <stop offset="100%" stop-color="#00D4FF" />
    </linearGradient>
  </defs>
  
  <!-- Left Building -->
  <rect x="20" y="45" width="16" height="40" fill="url(#cityGlow)" />
  <rect x="24" y="52" width="2" height="4" fill="#141432" />
  <rect x="30" y="52" width="2" height="4" fill="#141432" />
  <rect x="24" y="62" width="2" height="4" fill="#141432" />
  <rect x="30" y="62" width="2" height="4" fill="#141432" />
  <rect x="24" y="72" width="2" height="4" fill="#141432" />
  <rect x="30" y="72" width="2" height="4" fill="#141432" />
  
  <!-- Center Tall Building (Tech tower) -->
  <rect x="42" y="25" width="16" height="60" fill="url(#cityGlow2)" />
  <polygon points="42,25 50,15 58,25" fill="url(#cityGlow2)" />
  
  <!-- AI Core / Eye -->
  <circle cx="50" cy="35" r="4" fill="#0A0A1A" />
  <circle cx="50" cy="35" r="2" fill="#06FFA5" />
  
  <!-- Right Building -->
  <rect x="64" y="35" width="16" height="50" fill="url(#cityGlow)" />
  <rect x="68" y="45" width="8" height="2" fill="#141432" />
  <rect x="68" y="55" width="8" height="2" fill="#141432" />
  <rect x="68" y="65" width="8" height="2" fill="#141432" />
  <rect x="68" y="75" width="8" height="2" fill="#141432" />
  
  <!-- Digital Nodes / AI connections -->
  <circle cx="28" cy="35" r="2" fill="#00D4FF" />
  <circle cx="72" cy="25" r="2" fill="#8B5CF6" />
  <path d="M28 35 L50 35 M72 25 L50 35" stroke="rgba(0, 212, 255, 0.4)" stroke-width="1" stroke-dasharray="2,2" />
</svg>
